<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">TODO List</h1>
        <form id="task-form" class="mb-3">
            <input type="text" id="task-name" class="form-control" placeholder="Назва задачі" required>
            <textarea id="task-desc" class="form-control mt-2" placeholder="Опис"></textarea>
            <button type="submit" class="btn btn-primary mt-2">Додати задачу</button>
        </form>
        <ul id="task-list" class="list-group"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
